<!-- docs/getting-started.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Getting Started - json-crud-ui</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            padding: 40px;
            line-height: 1.7;
        }

        h1 {
            color: #38bdf8;
        }

        .Box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        pre {
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <h1>Getting Started</h1>

    <p>
        Install the package:
    </p>

    <div class="Box">

        <pre>
npm install json-crud-ui
        </pre>

    </div>

    <p>
        Initialize a project:
    </p>

    <div class="Box">

        <pre>
npx json-crud-ui init
        </pre>

    </div>

    <p>
        Generated projects follow a standardized architecture.
    </p>

</body>

</html>
